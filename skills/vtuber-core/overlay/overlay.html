<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>wadebot Stream Overlay</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap');
    
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    body {
      background: #ff00ff; /* Chroma key — set OBS color key filter to this */
      font-family: 'JetBrains Mono', monospace;
      padding: 20px;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      min-height: 100vh;
    }
    
    .log-container {
      display: flex;
      flex-direction: column;
      gap: 8px;
      max-height: 80vh;
      overflow: hidden;
    }
    
    .entry {
      background: linear-gradient(135deg, rgba(15, 15, 25, 0.95) 0%, rgba(25, 25, 40, 0.95) 100%);
      border: 2px solid #6366f1;
      border-radius: 12px;
      padding: 16px 24px;
      max-width: 600px;
      box-shadow: 0 0 20px rgba(99, 102, 241, 0.3), 0 0 40px rgba(99, 102, 241, 0.1);
      animation: slideIn 0.3s ease-out;
    }
    
    .entry.thought {
      border-color: #8b5cf6;
      box-shadow: 0 0 20px rgba(139, 92, 246, 0.3);
    }
    
    .entry.speech {
      border-color: #22c55e;
      box-shadow: 0 0 20px rgba(34, 197, 94, 0.3);
    }
    
    @keyframes slideIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
    
    .header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 10px;
    }
    
    .avatar { font-size: 20px; }
    
    .name {
      color: #a5b4fc;
      font-size: 12px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 2px;
    }
    
    .thought .name { color: #c4b5fd; }
    .speech .name { color: #86efac; }
    
    .entry-text {
      color: #e2e8f0;
      font-size: 18px;
      line-height: 1.4;
      font-weight: 400;
    }
    
    /* Old entries dim text but NOT opacity (chroma key breaks with opacity) */
    .old .entry-text { color: #64748b; }
    .old.thought { border-color: #4b4a6a; background: linear-gradient(135deg, rgba(10, 10, 18, 0.95) 0%, rgba(18, 18, 28, 0.95) 100%); }
    .old.speech { border-color: #14532d; background: linear-gradient(135deg, rgba(10, 10, 18, 0.95) 0%, rgba(18, 18, 28, 0.95) 100%); }
    .old .name { color: #64748b; }
  </style>
</head>
<body>
  <div class="log-container" id="log"></div>

  <script>
    // ── Configuration ──
    // Override these via URL params: ?name=Wade&maxEntries=8&pollMs=300
    const params = new URLSearchParams(window.location.search);
    const CONFIG = {
      name: params.get('name') || 'Agent',
      maxEntries: parseInt(params.get('maxEntries')) || 6,
      pollMs: parseInt(params.get('pollMs')) || 500,
      speechEmoji: params.get('speechEmoji') || '🎤',
      thoughtEmoji: params.get('thoughtEmoji') || '💭',
    };

    let lastTimestamp = 0;
    let entries = [];
    
    async function checkForNew() {
      try {
        const response = await fetch('thought.json?' + Date.now());
        const data = await response.json();
        
        if (data.timestamp > lastTimestamp && data.text && data.text.trim()) {
          lastTimestamp = data.timestamp;
          addEntry(data.text, data.type || 'thought');
        }
      } catch (e) { /* file not ready yet, that's fine */ }
    }
    
    function addEntry(text, type) {
      const log = document.getElementById('log');
      const emoji = type === 'speech' ? CONFIG.speechEmoji : CONFIG.thoughtEmoji;
      
      // Dim old entries
      document.querySelectorAll('.entry').forEach(el => el.classList.add('old'));
      
      const entry = document.createElement('div');
      entry.className = 'entry ' + type;
      entry.innerHTML = `
        <div class="header">
          <span class="avatar">${emoji}</span>
          <span class="name">${CONFIG.name}</span>
        </div>
        <div class="entry-text">${text}</div>
      `;
      
      log.appendChild(entry);
      entries.push(entry);
      
      // Remove oldest if too many
      if (entries.length > CONFIG.maxEntries) {
        entries.shift().remove();
      }
    }
    
    setInterval(checkForNew, CONFIG.pollMs);
  </script>
</body>
</html>
